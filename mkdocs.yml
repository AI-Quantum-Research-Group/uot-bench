site_name: uot-bench
site_description: JAX-first optimal transport benchmarking toolkit
site_url: https://AI-Quantum-Research-Group.github.io/uot-bench/
repo_url: https://github.com/AI-Quantum-Research-Group/uot-bench
repo_name: AI-Quantum-Research-Group/uot-bench

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source
            docstring_style: google

nav:
  - Home: index.md
  - Getting started:
      - Install: install.md
      - Quickstart: quickstart.md
  - Library guide:
      - Concepts: guide/concepts.md
      - Writing a custom Problem: guide/custom-problem.md
      - Writing a custom Generator: guide/custom-generator.md
      - Writing a custom Solver: guide/custom-solver.md
      - Running an Experiment in Python: guide/experiments.md
      - Post-solve hooks: guide/hooks.md
      - OTT-JAX interoperability: guide/ott-interop.md
      - Measures and cost functions: guide/measures.md
  - CLI & YAML:
      - Overview: cli/index.md
      - Generating datasets: cli/serialize.md
      - Running benchmarks: cli/benchmark.md
      - Color transfer: cli/color-transfer.md
      - MNIST: cli/mnist.md
      - SLURM: cli/slurm.md
  - Reference:
      - uot (top-level): api/uot.md
      - uot.problems: api/problems.md
      - uot.solvers: api/solvers.md
      - uot.experiments: api/experiments.md
      - uot.data: api/data.md
      - uot.utils: api/utils.md
      - uot.interop.ott: api/interop_ott.md
  - Changelog: changelog.md
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: .
  - admonition
  - tables
  - attr_list
